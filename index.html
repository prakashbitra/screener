<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Structure Screener</title>
    <style>
        body { font-family: system-ui; background: #0b0f19; color: #f8fafc; padding: 2rem; max-width: 900px; margin: auto; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid #1e293b; padding-bottom: 1rem;}
        button { background: transparent; color: #64748b; border: 1px solid #1e293b; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        button.active { background: #2563eb; color: white; border-color: #2563eb; }
        table { width: 100%; border-collapse: collapse; background: #141b2d; border-radius: 8px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #1e293b; }
        th { background: rgba(0,0,0,0.3); color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; }
        .badge { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold;}
    </style>
</head>
<body>

    <div>
        <h2>Stock Screener</h2>
        <p style="color:#64748b; font-size: 0.9rem;" id="timestamp">Loading update time...</p>
    </div>

    <div class="tabs">
        <button id="btn-india" class="active" onclick="loadTab('india')">India (NSE)</button>
        <button id="btn-usa" onclick="loadTab('usa')">USA Markets</button>
    </div>

    <table>
        <thead><tr><th>Asset & Chart</th><th>Entry Price</th><th>Target (1:2)</th><th>Stop Loss</th></tr></thead>
        <tbody id="table-body"><tr><td colspan="4">Fetching latest scan...</td></tr></tbody>
    </table>

<script>
        let screenerData = {};
        const CACHE_TIME_MS = 60000; // 60 seconds. Change to whatever you prefer.

        async function init() {
            const now = new Date().getTime();
            const lastFetch = localStorage.getItem('lastFetchTime');
            const cachedData = localStorage.getItem('screenerData');

            // 1. Check if we should block the refresh and use the cache
            if (cachedData && lastFetch && (now - lastFetch < CACHE_TIME_MS)) {
                screenerData = JSON.parse(cachedData);
                const secondsLeft = Math.round((CACHE_TIME_MS - (now - lastFetch)) / 1000);
                document.getElementById('timestamp').innerText = 
                    `Last Scanned: ${screenerData.last_updated} (Network refresh blocked for ${secondsLeft}s)`;
                loadTab('india');
                return; // Stop the script here, do not fetch from GitHub
            }

            // 2. If the cache expired, fetch fresh data from GitHub
            try {
                const response = await fetch('data.json?t=' + now);
                screenerData = await response.json();
                
                // Save the fresh data to the browser's cache memory
                localStorage.setItem('screenerData', JSON.stringify(screenerData));
                localStorage.setItem('lastFetchTime', now.toString());

                document.getElementById('timestamp').innerText = "Last Scanned: " + screenerData.last_updated;
                loadTab('india');
            } catch (error) {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="3">Data initializing. Wait for first scan.</td></tr>`;
            }
        }

function loadTab(region) {
            document.getElementById('btn-india').className = region === 'india' ? 'active' : '';
            document.getElementById('btn-usa').className = region === 'usa' ? 'active' : '';
            
            const tbody = document.getElementById('table-body');
            const data = screenerData[region] || [];
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">No active setups right now.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(stock => {
                // Generate the correct TradingView URL prefix
                const exchangePrefix = region === 'india' ? 'NSE:' : '';
                const cleanTicker = stock.ticker.replace('.NS', '');
                const tvLink = `https://www.tradingview.com/chart/?symbol=${exchangePrefix}${cleanTicker}`;

                return `
                <tr>
                    <td>
                        <a href="${tvLink}" target="_blank" style="color: #60a5fa; text-decoration: none; font-weight: bold; font-size: 1.1rem;">
                            ${cleanTicker} ↗
                        </a>
                        <div style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">CHoCH Breakout (${stock.bars} bars ago)</div>
                    </td>
                    <td style="font-weight: 500;">$${stock.entry.toFixed(2)}</td>
                    <td style="color: #10b981; font-weight: 600;">$${stock.target.toFixed(2)}</td>
                    <td style="color: #ef4444; font-weight: 600;">$${stock.sl.toFixed(2)}</td>
                </tr>
                `;
            }).join('');
        }

        init();
    </script>
</body>
</html>
